<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himma Africa</title>
    <style>
        html, body {
           margin: 0;
		   padding:0;
		   min-height: 100vh;
        }

        body {
			display: flex;
			align-items: center;
			justify-content: center;
			
			font-family: monospace;
            font-size: 50px;
            background-color: aqua;
            color: darkblue;
			
			padding: 2rem;
		}
		
		h1 {
			margin: 0;
			width: min(60%, 1000px);
			font-size: clamp(2rem, 5vw, 5rem);
			line-height: 1.2;
			text-align: left;
			}
		

        .thick {
			text-decoration: underline;
			text-decoration-thickness: 9px;
		}

    </style>
</head>
<body>
    <h1>Welcome to Himma. At <span class="thick" >Himma</span> we are empowering the next generation of African Tech Giants.</h1>
</body>
</html>
